<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="baidu-site-verification" content="codeva-Gh1MHoDXh0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary }}{{ end }}">
  <meta name="keywords" content="{{ with .Params.tags }}{{ delimit . ", " }}{{ else }}{{ .Site.Params.keywords }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Summary }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ .Summary }}">
  <link rel="canonical" href="{{ .Permalink }}">
  {{ with .OutputFormats.Get "RSS" }}<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}">{{ end }}
  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a2e;
      --heading: #16213e;
      --accent: #0f3460;
      --link: #e94560;
      --code-bg: #282c34;
      --border: #e0e0e0;
      --tag-bg: #f0f0f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .site-header {
      text-align: center;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .site-header h1 { font-size: 2rem; color: var(--heading); }
    .site-header .subtitle { color: #666; font-size: 1.1rem; margin-top: 0.5rem; }
    nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    nav a { color: var(--accent); font-weight: 500; }
    .post-card { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .post-card:last-child { border-bottom: none; }
    .post-meta { color: #888; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .post-card h3 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .post-card h3 a { color: var(--heading); }
    .post-card h3 a:hover { color: var(--link); }
    .excerpt { color: #555; }
    .tag { background: var(--tag-bg); padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.85rem; }
    article.post { margin-bottom: 3rem; }
    article.post h1 { font-size: 2rem; margin-bottom: 0.5rem; color: var(--heading); }
    article.post h2 { margin-top: 2rem; color: var(--heading); }
    article.post h3 { margin-top: 1.5rem; }
    article.post p { margin-bottom: 1rem; }
    article.post ul, article.post ol { margin: 1rem 0; padding-left: 2rem; }
    article.post li { margin-bottom: 0.3rem; }
    article.post pre {
      background: var(--code-bg);
      color: #abb2bf;
      padding: 1.2rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    article.post code {
      background: #f4f4f4;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
    }
    article.post pre code { background: none; padding: 0; }
    article.post blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #555;
    }
    .tags-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .tags-list a { background: var(--tag-bg); padding: 0.3rem 0.8rem; border-radius: 15px; font-size: 0.9rem; color: var(--text); }
    .tags-list a:hover { background: var(--accent); color: white; text-decoration: none; }
    .about-content { margin-top: 1rem; }
    .about-content h2 { margin-bottom: 1rem; }
    footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      color: #888;
      font-size: 0.9rem;
    }
    @media (max-width: 600px) {
      body { padding: 1rem 0.8rem; }
      .site-header h1 { font-size: 1.5rem; }
      nav { gap: 1rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a href="/">{{ .Site.Title }}</a></h1>
  </header>
  <nav>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
  </nav>
  {{ block "main" . }}{{ end }}
  <footer>
    {{ .Site.Params.copyright }}
  </footer>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "{{ .Site.Title }}",
    "description": "{{ .Site.Params.description }}",
    "url": "{{ .Site.BaseURL }}"
  }
  </script>
</body>
</html>
